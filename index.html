<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sync Arrive</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f6f8;
    --surface: #ffffff;
    --border: #e2e5eb;
    --border-strong: #c8cdd8;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --accent2: #ef4444;
    --text: #111827;
    --muted: #6b7280;
    --card: #ffffff;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 80px;
  }

  /* Subtle dot grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #c8cdd8 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.45;
  }

  .container {
    width: 100%;
    max-width: 680px;
    position: relative;
    z-index: 1;
  }

  header {
    margin-bottom: 40px;
    text-align: left;
  }

  .logo {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.6); }
  }

  h1 {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(26px, 5vw, 40px);
    font-weight: 600;
    line-height: 1.15;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 8px;
    font-size: 13px;
    color: var(--muted);
  }

  .clock {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    background: var(--surface);
    display: inline-block;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }

  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 24px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    font-weight: 600;
  }

  .player-row {
    display: grid;
    grid-template-columns: 6fr 60px 100px 36px;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
    animation: slideIn 0.18s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  input[type="text"], input[type="number"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 9px 12px;
    border-radius: 8px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  input[type="text"]:focus, input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    background: #fff;
  }

  input::placeholder { color: #b0b7c3; }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type="number"] { -moz-appearance: textfield; }

  .btn-icon {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 16px;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .btn-icon:hover {
    border-color: var(--accent2);
    color: var(--accent2);
    background: #fef2f2;
  }

  .add-player-btn {
    background: transparent;
    border: 1.5px dashed var(--border-strong);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 9px;
    border-radius: 8px;
    cursor: pointer;
    width: 100%;
    text-align: center;
    transition: all 0.15s;
    margin-top: 8px;
  }

  .add-player-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: #eff6ff;
  }

  .hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  .hint code {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 4px;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
  }

  .btn-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .btn-primary:hover {
    background: var(--accent-hover);
    border-color: var(--accent-hover);
    box-shadow: 0 4px 12px rgba(37,99,235,0.25);
  }

  .btn-secondary {
    background: var(--surface);
    border-color: var(--border);
    color: var(--text);
  }

  .btn-secondary:hover {
    border-color: var(--border-strong);
    background: var(--bg);
  }

  .btn-danger {
    background: var(--surface);
    border-color: var(--border);
    color: var(--muted);
  }

  .btn-danger:hover {
    border-color: var(--accent2);
    color: var(--accent2);
    background: #fef2f2;
  }

  .result-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 24px;
    display: none;
    box-shadow: var(--shadow-md);
  }

  .result-section.visible {
    display: block;
    animation: fadeUp 0.25s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-note {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .result-note span { color: var(--accent); font-weight: 600; }

  .result-table {
    width: 100%;
    border-collapse: collapse;
  }

  .result-table th {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    text-align: left;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
  }

  .result-table td {
    font-size: 13px;
    padding: 10px 10px;
    border-bottom: 1px solid var(--bg);
  }

  .result-table tr:hover td { background: #f8faff; }
  .result-table tr.anchor td { color: var(--accent); }

  .delay-chip {
    display: inline-block;
    background: #eff6ff;
    color: var(--accent);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 600;
  }

  .delay-chip.zero {
    background: #fef2f2;
    color: var(--accent2);
  }

  .error {
    color: var(--accent2);
    font-size: 12px;
    padding: 10px 12px;
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 8px;
    display: none;
    margin-bottom: 12px;
  }

  .error.visible { display: block; }

  .copied-toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 8px;
    opacity: 0;
    transition: all 0.22s ease;
    pointer-events: none;
    z-index: 100;
    box-shadow: var(--shadow-md);
  }

  .copied-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">[PRV] LightOfTheWorld - 2231</div>
    <h1>Rally Sync Calculator</h1>
    <div class="clock" id="clock">--:--:-- UTC</div>
  </header>

  <!-- Players Section -->
  <div class="section">
    <div style="display:grid;grid-template-columns:6fr 60px 100px 36px;gap:8px;margin-bottom:10px;padding-right:44px;">
      <div class="section-label" style="margin-bottom:0;text-align:center;">Player</div>
      <div class="section-label" style="margin-bottom:0;text-align:center;">March</div>
      <div class="section-label" style="margin-bottom:0;text-align:center;">Ratio</div>
    </div>
    <div id="players-list"></div>
    <button class="add-player-btn" onclick="addPlayer()">+ Add Player</button>
  </div>

  <!-- Offset Section -->
  <div class="section">
    <div class="section-label">Offset (Preparation Time)</div>
    <div style="display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;">
      <input type="number" id="offset-input" placeholder="e.g. 30" min="0" value="30">
      <span style="font-size:11px;color:var(--muted);white-space:nowrap;">seconds</span>
    </div>
    <div class="hint" style="margin-top:8px;">Current UTC + offset = T0. Gives you time to share the result before the clock hits T0.</div>
  </div>

  <!-- Actions -->
  <div class="section">
    <div class="section-label">Calculate</div>
    <div class="error" id="error-msg"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="calculate()">▶ Calculate</button>
      <button class="btn btn-secondary" onclick="copyResult()">Copy Result</button>
      <button class="btn btn-danger" onclick="resetAll()">Reset</button>
    </div>
  </div>

  <!-- Results -->
  <div class="result-section" id="result-section">
    <div class="section-label">Result</div>
    <div class="result-note" id="result-note"></div>

    <!-- Copyable plain-text block -->
    <div style="background:#f8faff;border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px;white-space:pre;font-family:'DM Mono',monospace;font-size:13px;line-height:2;color:var(--text);" id="result-plaintext"></div>

    <table class="result-table">
      <thead>
        <tr>
          <th>Player</th>
          <th>Travel Time</th>
          <th>Depart At (UTC)</th>
          <th>Delay from T0</th>
          <th>Ratio</th>
        </tr>
      </thead>
      <tbody id="result-body"></tbody>
    </table>
  </div>
</div>

<div class="copied-toast" id="toast">COPIED ✓</div>

<script>
  // UTC Clock
  function updateClock() {
    const now = new Date();
    const h = String(now.getUTCHours()).padStart(2,'0');
    const m = String(now.getUTCMinutes()).padStart(2,'0');
    const s = String(now.getUTCSeconds()).padStart(2,'0');
    document.getElementById('clock').textContent = `${h}:${m}:${s} UTC`;
  }
  setInterval(updateClock, 1000);
  updateClock();

  // Player management
  let playerCount = 0;
  let lastResult = '';

  function addPlayer(name='', seconds='', ratio='') {
    playerCount++;
    const id = playerCount;
    const list = document.getElementById('players-list');
    const row = document.createElement('div');
    row.className = 'player-row';
    row.id = `player-${id}`;
    row.innerHTML = `
      <input type="text" placeholder="Name" value="${name}" id="name-${id}">
      <input type="number" placeholder="Secs" value="${seconds}" id="sec-${id}" min="0">
      <input type="text" placeholder="Ratio" value="${ratio}" id="ratio-${id}">
      <button class="btn-icon" onclick="removePlayer(${id})">×</button>
    `;
    list.appendChild(row);
  }

  function removePlayer(id) {
    const el = document.getElementById(`player-${id}`);
    if (el) el.remove();
  }

  function applyPaste() {
    const raw = document.getElementById('paste-input').value.trim();
    if (!raw) return;
    // Parse format: 23Y2 46CA or 23Y246CA
    const tokens = raw.split(/\s+/);
    const parsed = [];
    for (let token of tokens) {
      const m = token.match(/^(\d+)([a-zA-Z].*)$/);
      if (m) parsed.push({ secs: m[1], name: m[2] });
    }
    if (parsed.length === 0) {
      showError('Could not parse. Use format: 23Y2 46CA 50YO');
      return;
    }
    hideError();
    parsed.forEach(p => addPlayer(p.name, p.secs));
    document.getElementById('paste-input').value = '';
  }

  function clearPaste() {
    document.getElementById('paste-input').value = '';
  }

  function utcString(date) {
    const h = String(date.getUTCHours()).padStart(2,'0');
    const m = String(date.getUTCMinutes()).padStart(2,'0');
    const s = String(date.getUTCSeconds()).padStart(2,'0');
    return `${h}:${m}:${s}`;
  }

  function addSeconds(date, secs) {
    return new Date(date.getTime() + secs * 1000);
  }

  function calculate() {
    hideError();
    const rows = document.querySelectorAll('.player-row');
    if (rows.length < 2) {
      showError('Add at least 2 players.');
      return;
    }

    const offset = parseInt(document.getElementById('offset-input').value) || 0;

    const players = [];
    for (let row of rows) {
      const id = row.id.split('-')[1];
      const name = document.getElementById(`name-${id}`).value.trim() || `P${id}`;
      const secs = parseInt(document.getElementById(`sec-${id}`).value);
      const ratio = document.getElementById(`ratio-${id}`).value.trim();
      if (isNaN(secs) || secs < 0) {
        showError(`Invalid seconds for "${name}".`);
        return;
      }
      players.push({ name, secs, ratio });
    }

    const maxSecs = Math.max(...players.map(p => p.secs));

    // T0 = now + offset
    const now = new Date();
    const t0 = addSeconds(now, offset);

    const tbody = document.getElementById('result-body');
    tbody.innerHTML = '';

    // Sort descending (slowest first = leaves at T0)
    const sorted = [...players].sort((a,b) => b.secs - a.secs);

    const plainLines = [];
    sorted.forEach((p) => {
      const delay = maxSecs - p.secs;
      const departTime = addSeconds(t0, delay);
      const timeStr = utcString(departTime);

      // Plain text line e.g. "06:47:10  Y2J2  50-20-30"
      const ratioStr = p.ratio ? `  ${p.ratio}` : '';
      plainLines.push(`${timeStr}  ${p.name}${ratioStr}`);

      const tr = document.createElement('tr');
      if (delay === 0) tr.classList.add('anchor');
      tr.innerHTML = `
        <td>${p.name}</td>
        <td>${p.secs}s</td>
        <td style="color:var(--accent);font-weight:700;">${timeStr}</td>
        <td><span class="delay-chip ${delay===0?'zero':''}">${delay===0 ? 'T0' : `+${delay}s`}</span></td>
        <td style="color:var(--muted);font-size:11px;">${p.ratio || '—'}</td>
      `;
      tbody.appendChild(tr);
    });

    lastResult = plainLines.join('\n');
    document.getElementById('result-plaintext').textContent = lastResult;

    const anchor = sorted[0];
    document.getElementById('result-note').innerHTML =
      `T0 = <span>${utcString(t0)} UTC</span> (now + ${offset}s offset). Slowest player <span>${anchor.name}</span> departs at T0 — everyone arrives together.`;

    document.getElementById('result-section').classList.add('visible');
  }

  function copyResult() {
    if (!lastResult) {
      showError('Calculate first before copying.');
      return;
    }
    navigator.clipboard.writeText(lastResult).then(() => showToast());
  }

  function resetAll() {
    document.getElementById('players-list').innerHTML = '';
    document.getElementById('paste-input').value = '';
    document.getElementById('result-section').classList.remove('visible');
    document.getElementById('result-body').innerHTML = '';
    lastResult = '';
    playerCount = 0;
    hideError();
    // Re-add 2 blank players
    addPlayer(); addPlayer();
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function hideError() {
    document.getElementById('error-msg').classList.remove('visible');
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  // Init with 3 blank players
  addPlayer(); addPlayer(); addPlayer();
</script>
</body>
</html>
